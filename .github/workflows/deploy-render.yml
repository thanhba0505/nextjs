name: Deploy to Render

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: |
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    concurrency:
      group: deploy-render
      cancel-in-progress: true
    env:
      RENDER_API_BASE: https://api.render.com/v1
      POLL_INTERVAL_SECONDS: 10
      MAX_POLLS: 90
    steps:
      - name: Trigger Render deploy
        id: trigger
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          if [ -z "${RENDER_API_KEY}" ] || [ -z "${RENDER_SERVICE_ID}" ]; then
            echo "Missing required secrets: RENDER_API_KEY or RENDER_SERVICE_ID"
            exit 1
          fi

          echo "Triggering Render deploy..."
          response="$(curl -fsSL -X POST \
            "${RENDER_API_BASE}/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json")"

          echo "Response: ${response}"

          deploy_id="$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read()).get("id",""))' <<<"${response}")"

          if [ -z "${deploy_id}" ] || [ "${deploy_id}" = "None" ]; then
            echo "Failed to get deploy ID"
            exit 1
          fi

          echo "DEPLOY_ID=${deploy_id}" >> "${GITHUB_ENV}"
          echo "Deploy ID: ${deploy_id}"

      - name: Poll deploy status
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail

          echo "Waiting Render deploy status..."

          for ((attempt=1; attempt<=MAX_POLLS; attempt++)); do
            response="$(curl -fsSL \
              "${RENDER_API_BASE}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}")"

            status="$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read()).get("status",""))' <<<"${response}")"

            echo "Attempt ${attempt}/${MAX_POLLS} - Status: ${status}"

            if [ "${status}" = "live" ]; then
              echo "Deploy SUCCESS"
              exit 0
            fi

            if [ "${status}" = "failed" ] || [ "${status}" = "canceled" ]; then
              echo "Deploy FAILED"
              echo "${response}"
              exit 1
            fi

            sleep "${POLL_INTERVAL_SECONDS}"
          done

          echo "Timed out waiting for Render deploy to become live"
          exit 1
